frameworks:
  list:
    label: "清单型"
    keywords: ["推荐", "清单", "工具", "合集", "几种", "几个"]
    content_styles: ["干货", "测评", "推荐"]
    opening: "开头直接给读者一个明确收益，再说明你为什么只留下这些项。"
    outline:
      - "为什么要筛选，而不是全都要"
      - "逐项展开，每项都讲适用场景和真实感受"
      - "最后给出作者自己的取舍"
    reason_template: "{topic} 更适合用清单结构，能把信息快速摊开给公众号读者。"
  opinion:
    label: "观点型"
    keywords: ["为什么", "看法", "趋势", "值不值", "到底", "真相"]
    content_styles: ["观点", "观察"]
    opening: "从一个反直觉判断或真实犹豫切入，先把态度亮出来。"
    outline:
      - "先讲大家通常怎么理解这件事"
      - "再讲你为什么不同意，或者只同意一半"
      - "最后把判断落回普通人的现实处境"
    reason_template: "{topic} 更像一个需要态度和判断的题目，用观点结构更容易写出辨识度。"
  story:
    label: "故事型"
    keywords: ["经历", "故事", "那次", "后来", "一次", "当时"]
    content_styles: ["故事", "情绪"]
    opening: "直接给一个场景、对话或当时的反应，不先解释背景。"
    outline:
      - "先还原那个具体瞬间"
      - "再讲事情怎么变成现在这样"
      - "最后讲这个故事为什么值得记住"
    reason_template: "{topic} 适合用故事结构，读者会更容易跟着情绪走进去。"
  recap:
    label: "复盘型"
    keywords: ["复盘", "踩坑", "回顾", "总结", "试了", "用了"]
    content_styles: ["复盘", "经验"]
    opening: "先交代结果，再讲中间最疼的那一步。"
    outline:
      - "事情开始前你以为会怎样"
      - "中间哪里出了偏差，真正的坑在哪"
      - "最后留下可复用的经验，而不是空总结"
    reason_template: "{topic} 带有明显经验回看属性，复盘结构会更自然。"
  tutorial:
    label: "教程型"
    keywords: ["怎么", "教程", "步骤", "方法", "上手", "入门"]
    content_styles: ["干货", "教程"]
    opening: "先讲最容易卡住的地方，再给出你建议的顺序。"
    outline:
      - "先说明为什么多数人会卡住"
      - "再按顺序拆成 3-5 步"
      - "最后补上最容易忽略的细节和边界"
    reason_template: "{topic} 更偏操作和上手，教程结构能让信息更实用。"
