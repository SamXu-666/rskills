strategies:
  density_boost:
    label: "信息密度增强"
    reason: "这类文章更看重读完能不能立刻拿走东西。"
    guidance:
      - "每个重点都尽量带一个工具名、动作、例子或数字。"
      - "少说抽象建议，多说作者自己会怎么做。"
      - "如果一句话不能指导下一步动作，就继续补具体。"
  detail_specificity:
    label: "细节具体化"
    reason: "这类文章最怕只有抽象感受，没有真实画面。"
    guidance:
      - "补时间、场景、动作、反应，而不是只讲结论。"
      - "优先写人是怎么想、怎么卡住、后来怎么变的。"
      - "至少留 2 处能让读者看到画面的细节。"
  angle_sharpening:
    label: "观点锐化"
    reason: "这类文章需要一个清楚的判断点，而不是中性复述。"
    guidance:
      - "先讲主流理解，再说明你不同意哪里。"
      - "观点要能落在普通读者的现实处境里。"
      - "避免‘两边都有道理’式收束。"
