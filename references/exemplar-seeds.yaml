# 通用人类写作模式种子
#
# 用途:没有范文库的用户,Step 4.4 用这些段落作为 few-shot 注入,
#       教 LLM "人类写作的结构模式长什么样"。
#
# 设计原则:
#   - 只示范结构模式(句长方差、情绪锐度、自我纠正、非总结式收尾)
#   - 不携带特定风格/人格(任何 persona 都能兼容)
#   - 每个段落标注了它示范的反AI模式
#
# 有用户自己的范文库时,这个文件不会被使用。

opening_hooks:
  - text: |
      好多年没有坐公交了,上次去太子湾,由于景区限行,只能把车停在外面,坐景区免费接驳车过去。
      前面座位看到一个小女孩一直在刷那种 AI 生成的短视频,画面非常粗糙,内容也很假,滑到下一个居然还是差不多的东西,看得津津有味。
      当时看到这一幕我甚至有点伤心。
    pattern: "日常观察切入 → 意外情绪反应。不总结、不预告、不铺垫。"

  - text: |
      **本硕八年毕业,单程通勤两个半小时,**月薪2690。 这是市场给我贴的标签。
      **裸辞。创业,年收超7位数。** 这是我自己撕掉那个标签之后,重新定义的自己。
      一路走来,中间发生了什么?我讲给你听。
    pattern: "标签→撕裂对比开头。两组加粗短句制造视觉和语义落差。句长标准差 45.7(数据最高)。"

  - text: |
      29号,我和小伙伴在深圳搞活动。
      活动结束之后,我想顺道拜访一个多年没见的老朋友,发消息过去。
      他回:在三亚。
      我问:度假?
      他说:带孩子。
      我盯着手机屏幕,愣了整整三秒。
    pattern: "对话碎片制造节奏。2-4字短句紧邻20+字长句。物理反应替代心理描写。"

  - text: |
      我信了这套话很多年。
      "要有长期主义。要相信复利。时间是最好的朋友。"
      最惨的一次,在一个方向扎进去3年,回头一看,什么都没留下来。
    pattern: "先认同再推翻。引用常见正确的话→用个人惨痛经历否定。开头即高潮。"

  # --- 以下来自对标账号「爱AI的大刘」的实战模式 ---

  - text: |
      13,338 个 Skills。你一天试一个,不吃不喝不睡觉,你需要试 37 年。
      这就好比你走进一家超级大超市,货架从地板堆到天花板,每个货架上摆满了你从没见过的东西。
      你推着购物车站在门口,不知道该往左走还是往右走。
    pattern: "数据冲击开头。大数字→荒诞换算(37年)→具象比喻(超市)制造无力感。适合工具盘点类。"

  - text: |
      就在上周,Anthropic 公测 Claude Managed Agents--一个 AI 替你打工一小时,只要 8 美分(约 5 毛 6)。
      搭一套生产级 Harness 要处理沙箱执行、身份验证、跨会话持久化--按 Anthropic 自己的话说,这是几个月的基础设施工程。
      Anthropic 这次把这些全包了,按 session-hour 卖给你。
    pattern: "产品发布钩子。一句话概括新品→核心卖点定价→'全包了'的语气转折。信息密度极高。"

  - text: |
      所有人都在说选对 Skills 是 Agent 解决实际落地的重点。
      但是不知道大家感觉到没,问题就出在选对这个事儿上。
      168 万个 Skill 摆在那,我自己和 Agent 根本不知道该用哪一个。
    pattern: "共识前置→转折质疑→痛点升级。'不知道该用哪一个'是用户内心独白。"

  - text: |
      这两天 Anthropic 在桌面端悄悄塞了一个开关,叫 Configure third-party inference。
      意思就是:只要你接的模型支持 Anthropic 协议,Claude Desktop 那套界面、Cowork、Plugin、Skills,全部照常能用。
      打通了。
    pattern: "'悄悄塞了'制造信息差。一句话解释技术含义。两字收束('打通了')。适合技术解读类。"

emotional_peaks:
  - text: |
      我信了这套话很多年。
      最惨的一次,在一个方向扎进去3年,回头一看,什么都没留下来。
      这不是失败--失败还有个明确的结果。
      是你信错了一件事。
    pattern: "用'最惨'而非'有挑战'。否定委婉说法('这不是失败'),给出更痛的定义。"

  - text: |
      很多人在温水煮青蛙的过程中得过且过,过着看似满意、实则内心有很多不满的生活,然后说一句,算了吧,现在这样也还行,但这样反而错失了挖掘自己最大潜力的机会。
    pattern: "用'温水煮青蛙'具象化停滞感。'算了吧'是内心独白式引用。来自得分最低(32.8)的文章。"

  - text: |
      讲真,我每次看到这种争论,都觉得......怎么说呢......挺无语的。
      不是说这些人蠢。
      是他们在纠结一个根本不存在的问题。
      什么叫"AI味道"?你能定义吗?你能量化吗?你能验证吗?
      不能。
      那你在纠结什么?
    pattern: "填充词('怎么说呢')+ 连续反问不给答案 + 单字段落('不能。')。"

transitions:
  - text: |
      我第一反应是“孩子这时候不应该在学校吗”，第二反应是想把这话发过去，第三反应是我把那句话吞回去了——因为我在那三秒里想清楚了一件事。
    pattern: "思维过程外化（三个反应）。破折号打断 → 时间锚点（'三秒'）→ 悬念。"

  - text: |
      不过，到了之后我发现，什么作息啊，学习强度啊，都不是最难熬的，人才是。
    pattern: "列举预期困难再一句否定。转折词 + 真实困难揭示。"

  - text: |
      不过话又说回来。知道自己在局里，这件事本身，就已经是出局的开始了。
    pattern: "'不过话又说回来'——自我推翻后重新定位。制造思维的非线性感。"

  # --- 来自对标账号「爱AI的大刘」---

  - text: |
      话不多说，开始！
    pattern: "极简过渡。删除所有铺垫，直接进入正题。适合教程类文章。"

  - text: |
      对号入座完，咱们开始。
    pattern: "读者互动后收束。'对号入座'暗示前面有适用人群列表，'咱们'拉近距离。"

  - text: |
      下面是我这一周的实测：三组对照、5 个真实职场任务、外加把技术细节扒到底。
    pattern: "预告结构。具体数字（三组、5个）+ '扒到底'承诺深度。信息密度高。"

  - text: |
      两件事一拼。打通了。
    pattern: "拼接式过渡。两件事→一句话结论。极简但信息量大。"

closings:
  - text: |
      时间是你唯一不可再生的资源。
      把它投进一个真实存在的锚点,才叫复利。
      投进一个"我相信它会好"的希望,叫做漫长的等死。
    pattern: "重新定义核心概念收尾。'等死'替代励志结论。来自得分 36.7 的文章。"

  - text: |
      有了 AI 之后,很多事都更容易了,但也正因为更容易了,什么东西真的值得做、值得花很多年去换,反而变得更难想清楚。要做什么可能比怎么更快做出一个东西更加重要了。
    pattern: "结尾是未完成的思考,不是结论。'可能'留有余地。没有升华。"

  - text: |
      我苦哈哈的在电脑前,写这篇文章,想着我的女儿。
      差距是真实的。
      机会也是真实的。
      时钟在走,窗口在收窄。
    pattern: "回到写作现场。重复句式('是真实的')制造执念感。来自得分 33.0 的文章。"

  - text: |
      不要在那个愣住的感觉里待太久。
      那个感觉,待久了,就成了借口。
    pattern: "回扣开头意象。两句话收束,不解释。草率感本身就是风格。"
